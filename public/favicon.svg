<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="orbit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#6A00FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#orbit-gradient)" stroke-width="4" stroke-dasharray="8 6" fill="none" opacity="0.8" />
  
  <!-- Main brand circle with gradient -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#orbit-gradient)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Core glowing hub -->
  <circle cx="50" cy="50" r="12" fill="url(#orbit-gradient)" />
</svg>
