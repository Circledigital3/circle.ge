<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Cyan to Blue Gradient -->
    <linearGradient id="cyan-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Blue to Lavender/Purple Gradient -->
    <linearGradient id="blue-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#6A00FF" />
    </linearGradient>

    <!-- Glow Filter for tab visibility -->
    <filter id="tab-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes breathingGlow {
        0%, 100% {
          opacity: 0.45;
          stroke-width: 2.5px;
          filter: drop-shadow(0 0 1px rgba(0, 242, 254, 0.3));
        }
        50% {
          opacity: 1;
          stroke-width: 4px;
          filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.8)) drop-shadow(0 0 10px rgba(106, 0, 255, 0.6));
        }
      }

      @keyframes twinkle {
        0%, 100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.95;
        }
      }

      .animated-ring {
        animation: breathingGlow 3s ease-in-out infinite;
        transform-origin: center;
      }

      .twinkle-accent {
        animation: twinkle 1.8s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
  </defs>

  <!-- Ambient background glow (subtle, transparent base) -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#00F2FE" stroke-width="6" opacity="0.15" filter="url(#tab-glow)" />

  <!-- Outer Purple Sleek Sweep (Left Side) -->
  <path 
    class="twinkle-accent"
    d="M 58 13 A 37 37 0 0 0 46 86" 
    fill="none" 
    stroke="url(#blue-purple)" 
    stroke-width="2" 
    stroke-linecap="round" 
  />

  <!-- Main Cyan-Blue Open Circle (C-shape outer line with pulse) -->
  <path 
    class="animated-ring"
    d="M 80 39 A 33 33 0 1 0 80 61" 
    fill="none" 
    stroke="url(#cyan-blue)" 
    stroke-width="3" 
    stroke-linecap="round" 
    filter="url(#tab-glow)"
  />

  <!-- Inner Cyan Sharp Accent (C-shape inner line) -->
  <path 
    d="M 76 43 A 28 28 0 1 0 76 57" 
    fill="none" 
    stroke="#00F2FE" 
    stroke-width="1.5" 
    stroke-linecap="round" 
    opacity="0.95"
  />
</svg>
