<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Beautiful Cyan-Blue Radial Glow Gradient -->
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#0099FF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.8" />
    </radialGradient>

    <!-- Deep high-visibility glow filter -->
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes blinkDot {
        0%, 100% {
          transform: scale(0.8);
          opacity: 0.75;
          filter: drop-shadow(0 0 3px rgba(0, 242, 254, 0.5));
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
          filter: drop-shadow(0 0 14px rgba(0, 242, 254, 1)) drop-shadow(0 0 24px rgba(59, 130, 246, 0.8));
        }
      }

      @keyframes pulseRing {
        0% {
          transform: scale(0.6);
          opacity: 0.9;
          stroke-width: 5px;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
          stroke-width: 1px;
        }
      }

      .glowing-dot {
        animation: blinkDot 1.8s ease-in-out infinite;
        transform-origin: center;
      }

      .expanding-ring-1 {
        animation: pulseRing 1.8s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        transform-origin: center;
      }

      .expanding-ring-2 {
        animation: pulseRing 1.8s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        animation-delay: 0.9s;
        transform-origin: center;
      }
    </style>
  </defs>

  <!-- Ambient pulse rings to create depth in browser tabs -->
  <circle class="expanding-ring-1" cx="50" cy="50" r="22" fill="none" stroke="#00F2FE" />
  <circle class="expanding-ring-2" cx="50" cy="50" r="22" fill="none" stroke="#3B82F6" opacity="0.8" />

  <!-- High visibility outer glow backing -->
  <circle cx="50" cy="50" r="16" fill="#00ffff" opacity="0.25" filter="url(#glow-blur)" />

  <!-- Core Blinking Cyan Dot -->
  <circle class="glowing-dot" cx="50" cy="50" r="16" fill="url(#cyan-glow)" filter="url(#glow-blur)" />
</svg>
